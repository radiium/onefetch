openapi: 3.0.3
info:
  title: DL Manager
  description: API for managing downloads from 1fichier.com
  version: "1"

servers:
  - url: /api
    description: API Server

tags:
  - name: Settings
    description: App settings
  - name: Downloads
    description: Downloads managed by the application
  - name: Files
    description: File system browser for the download directory

paths:
  /settings:
    get:
      tags:
        - Settings
      summary: Get settings
      description: Get settings
      operationId: getSettings
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - Settings
      summary: Update settings
      description: Update settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/infos:
    get:
      tags:
        - Downloads
      summary: Get file info from 1fichier
      description: Fetch file metadata from 1fichier and return available download directories
      operationId: getDownloadInfos
      parameters:
        - name: url
          in: query
          description: 1fichier file URL
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File info retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadInfoResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads:
    post:
      tags:
        - Downloads
      summary: Create and start a download
      description: Create and start a download
      operationId: createDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDownloadRequest'
      responses:
        '201':
          description: Download created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Download'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Downloads
      summary: List downloads with pagination, filters and sorting
      description: List downloads with pagination, filters and sorting
      operationId: listDownloads
      parameters:
        - name: status
          in: query
          description: Filter by download status
          required: false
          schema:
            $ref: '#/components/schemas/DownloadStatus'
        - name: type
          in: query
          description: Filter by download type
          required: false
          schema:
            $ref: '#/components/schemas/DownloadType'
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Downloads retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadPage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/streams:
    get:
      tags:
        - Downloads
      summary: Server-Sent Events stream of active downloads
      description: Server-Sent Events stream of active downloads
      operationId: streamDownloads
      responses:
        '200':
          description: SSE stream of download progress events
          content:
            text/event-stream:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DownloadProgressEvent'

  /downloads/{id}/pause:
    post:
      tags:
        - Downloads
      summary: Pause a download
      description: Pause a download
      operationId: pauseDownload
      parameters:
        - name: id
          in: path
          description: Download ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download paused successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Download not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/{id}/resume:
    post:
      tags:
        - Downloads
      summary: Resume a download
      description: Resume a download
      operationId: resumeDownload
      parameters:
        - name: id
          in: path
          description: Download ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download resumed successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Download not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/{id}/cancel:
    post:
      tags:
        - Downloads
      summary: Cancel a download
      description: Cancel a download
      operationId: cancelDownload
      parameters:
        - name: id
          in: path
          description: Download ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download cancelled successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Download not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/{id}/archive:
    post:
      tags:
        - Downloads
      summary: Archive a download
      description: Archive a download
      operationId: archiveDownload
      parameters:
        - name: id
          in: path
          description: Download ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download archived successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Download not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /downloads/{id}:
    delete:
      tags:
        - Downloads
      summary: Delete a download
      description: Delete a download record
      operationId: deleteDownload
      parameters:
        - name: id
          in: path
          description: Download ID
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Download deleted successfully
        '404':
          description: Download not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /files:
    get:
      tags:
        - Files
      summary: Get download directory tree
      description: Returns the file system tree of the download directory
      operationId: getFiles
      responses:
        '200':
          description: File system tree retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FSNode'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Files
      summary: Create a directory
      description: Create a new directory inside the download directory
      operationId: createDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDirRequest'
      responses:
        '201':
          description: Directory created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FSNode'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Files
      summary: Delete a file or directory
      description: Delete a file or directory at the given path
      operationId: deleteFile
      parameters:
        - name: path
          in: query
          description: Path of the file or directory to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File or directory deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FSNode'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    DownloadStatus:
      type: string
      enum:
        - IDLE
        - PENDING
        - REQUESTING_INFOS
        - REQUESTING_TOKEN
        - DOWNLOADING
        - PAUSED
        - CANCELLED
        - FAILED
        - COMPLETED
      description: Download status

    DownloadType:
      type: string
      enum:
        - MOVIE
        - SERIE
      description: Type of downloaded content

    Settings:
      type: object
      required:
        - apiKey
        - downloadPath
      properties:
        apiKey:
          type: string
          description: 1fichier.com API key
        downloadPath:
          type: string
          description: Local path where files will be downloaded

    CreateDownloadRequest:
      type: object
      required:
        - url
        - type
      properties:
        url:
          type: string
          description: 1fichier file URL
        type:
          $ref: '#/components/schemas/DownloadType'
        fileName:
          type: string
          nullable: true
          description: Override the downloaded file name
        fileDir:
          type: string
          nullable: true
          description: Override the destination directory

    Download:
      type: object
      required:
        - id
        - fileUrl
        - fileId
        - fileName
        - type
        - status
        - progress
        - downloadedBytes
        - downloadPath
        - createdAt
        - updatedAt
        - retryCount
      properties:
        id:
          type: string
          description: Unique download identifier
        fileUrl:
          type: string
          description: Original file URL
        fileId:
          type: string
          description: 1fichier file ID
        fileName:
          type: string
          description: Name of the file
        fileSize:
          type: integer
          format: int64
          nullable: true
          description: Total file size in bytes
        mimeType:
          type: string
          nullable: true
          description: MIME type of the file
        checksum:
          type: string
          nullable: true
          description: File checksum
        type:
          $ref: '#/components/schemas/DownloadType'
        directDownloadUrl:
          type: string
          nullable: true
          description: Direct download URL from 1fichier
        directUrlExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration date of the direct download URL
        status:
          $ref: '#/components/schemas/DownloadStatus'
        progress:
          type: number
          format: double
          description: Download progress (0-100)
        downloadedBytes:
          type: integer
          format: int64
          description: Number of bytes downloaded
        speed:
          type: number
          format: double
          nullable: true
          description: Download speed in bytes per second
        downloadPath:
          type: string
          description: Final path where the file will be saved
        tempPath:
          type: string
          nullable: true
          description: Temporary path during download
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: Download start timestamp
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Download completion timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        errorMessage:
          type: string
          nullable: true
          description: Error message if download failed
        retryCount:
          type: integer
          description: Number of retry attempts

    DownloadProgressEvent:
      type: object
      required:
        - downloadId
        - fileName
        - status
        - progress
        - downloadedBytes
      properties:
        downloadId:
          type: string
          description: Download identifier
        fileName:
          type: string
          description: Name of the file being downloaded
        customFileName:
          type: string
          nullable: true
          description: Custom file name override
        customFileDir:
          type: string
          nullable: true
          description: Custom destination directory override
        status:
          $ref: '#/components/schemas/DownloadStatus'
        progress:
          type: number
          format: double
          description: Download progress (0-100)
        downloadedBytes:
          type: integer
          format: int64
          description: Number of bytes downloaded
        fileSize:
          type: integer
          format: int64
          nullable: true
          description: Total file size in bytes
        speed:
          type: number
          format: double
          nullable: true
          description: Download speed in bytes per second

    FileInfo:
      type: object
      properties:
        url:
          type: string
          description: 1fichier file URL
        filename:
          type: string
          description: File name
        size:
          type: integer
          format: int64
          description: File size in bytes
        checksum:
          type: string
          description: File checksum
        content-type:
          type: string
          description: MIME type
        description:
          type: string
          nullable: true
          description: File description
        pass:
          type: integer
          description: Password protection flag
        path:
          type: string
          description: File path on 1fichier
        folder_id:
          type: string
          description: Folder ID on 1fichier

    DownloadInfoResponse:
      type: object
      required:
        - fileinfo
        - directories
      properties:
        fileinfo:
          $ref: '#/components/schemas/FileInfo'
        directories:
          type: object
          description: Available destination directories indexed by download type
          additionalProperties:
            type: array
            items:
              type: string

    FSNode:
      type: object
      required:
        - name
        - path
        - size
        - modTime
        - isDir
        - isReadOnly
        - isHidden
        - isTmp
      properties:
        name:
          type: string
          description: File or directory name
        path:
          type: string
          description: Full path
        size:
          type: integer
          format: int64
          description: Size in bytes
        modTime:
          type: string
          format: date-time
          description: Last modification time
        isDir:
          type: boolean
          description: Whether this node is a directory
        isReadOnly:
          type: boolean
          description: Whether this node is read-only
        isHidden:
          type: boolean
          description: Whether this node is hidden
        isTmp:
          type: boolean
          description: Whether this is a temporary file
        children:
          type: array
          items:
            $ref: '#/components/schemas/FSNode'
          description: Child nodes (directories only)

    CreateDirRequest:
      type: object
      required:
        - path
        - dirname
      properties:
        path:
          type: string
          description: Parent directory path
        dirname:
          type: string
          description: Name of the new directory

    DownloadQueryParams:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/DownloadStatus'
        type:
          $ref: '#/components/schemas/DownloadType'
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1

    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
        total:
          type: integer
          description: Total number of items
        totalPages:
          type: integer
          description: Total number of pages

    DownloadPage:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Download'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message describing what went wrong
        code:
          type: string
          description: Optional error code for programmatic error handling
